<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0016">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>送上祝福</title>
<style>
/* ═══ 重置 & 变量 ════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --primary: #ff6b8a;
  --primary-dark: #c94070;
  --bg: #0d0016;
  --card: rgba(255,255,255,0.055);
  --border: rgba(255,255,255,0.1);
  --text: #fff;
  --text-dim: rgba(255,255,255,0.45);
  --success: #4ade80;
}

html { height:100%; }
body {
  min-height:100%;
  background: radial-gradient(ellipse 100% 60% at 50% 0%, rgba(120,0,60,0.7) 0%, transparent 60%),
              linear-gradient(180deg, #140020 0%, #0a0016 40%, #060010 100%);
  background-attachment:fixed;
  color:var(--text);
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  padding-bottom:env(safe-area-inset-bottom);
  -webkit-font-smoothing:antialiased;
}

/* ═══ 顶部 ════════════════════════════════════════════════════ */
#top-bar {
  position:sticky; top:0; z-index:20;
  padding:16px 20px 12px;
  background:linear-gradient(to bottom, rgba(14,0,22,0.96) 70%, transparent);
  backdrop-filter:blur(12px);
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
#top-bar .couple {
  font-size:22px; font-weight:700; letter-spacing:3px;
  background:linear-gradient(135deg, #fff 30%, var(--primary));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
#top-bar .heart { -webkit-text-fill-color:var(--primary); margin:0 6px; }
#top-bar .subtitle {
  font-size:11px; letter-spacing:5px; color:var(--text-dim); margin-top:3px;
}
/* 在线人数角标 */
#live-count {
  position:absolute; top:14px; right:16px;
  font-size:11px; color:var(--text-dim);
  display:flex; align-items:center; gap:4px;
}
#live-dot {
  width:6px; height:6px; border-radius:50%; background:#4ade80;
  animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ═══ 主内容 ═════════════════════════════════════════════════ */
#main { padding:20px 18px; display:flex; flex-direction:column; gap:16px; }

/* ═══ 输入卡片 ═══════════════════════════════════════════════ */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:18px;
  backdrop-filter:blur(12px);
}

.card-title {
  font-size:11px; letter-spacing:3px; color:rgba(255,180,180,0.45);
  margin-bottom:12px; text-transform:uppercase;
}

/* 名字输入 */
#name-row { display:flex; align-items:center; gap:10px; margin-bottom:0; }
.avatar-placeholder {
  width:42px; height:42px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg, rgba(255,107,138,0.3), rgba(200,60,100,0.3));
  border:1px solid rgba(255,107,138,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
}

.field {
  width:100%; padding:12px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  color:#fff; font-size:15px; outline:none;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
.field:focus {
  border-color:rgba(255,107,138,0.7);
  box-shadow:0 0 0 3px rgba(255,107,138,0.12);
}
.field::placeholder { color:rgba(255,255,255,0.22); }

/* ═══ 快捷祝福 ═══════════════════════════════════════════════ */
#quick-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.quick-btn {
  padding:11px 10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  color:rgba(255,220,220,0.8);
  font-size:13px;
  cursor:pointer;
  text-align:center;
  transition:all .18s;
  line-height:1.35;
  -webkit-user-select:none;
  user-select:none;
}
.quick-btn:active, .quick-btn.picked {
  background:rgba(255,107,138,0.2);
  border-color:rgba(255,107,138,0.5);
  color:#fff;
  transform:scale(0.97);
}

/* ═══ 祝福文字框 ══════════════════════════════════════════════ */
#msg-wrap { position:relative; }
#msg-field {
  width:100%; height:100px;
  resize:none; font-size:15px; line-height:1.6;
  border-radius:14px;
  padding:12px 16px 32px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff; outline:none;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
#msg-field:focus {
  border-color:rgba(255,107,138,0.7);
  box-shadow:0 0 0 3px rgba(255,107,138,0.12);
}
#msg-field::placeholder { color:rgba(255,255,255,0.22); }
#char-count {
  position:absolute; bottom:10px; right:14px;
  font-size:11px; color:rgba(255,255,255,0.25);
  pointer-events:none;
}
#char-count.warn { color:rgba(255,107,138,0.7); }

/* ═══ 发送按钮 ═══════════════════════════════════════════════ */
#send-btn {
  width:100%; padding:16px;
  background:linear-gradient(135deg, var(--primary), var(--primary-dark));
  border:none; border-radius:16px;
  color:#fff; font-size:17px; font-weight:700;
  letter-spacing:3px; cursor:pointer;
  box-shadow:0 6px 28px rgba(255,80,120,0.35);
  transition:all .2s;
  -webkit-user-select:none;
  user-select:none;
  position:relative; overflow:hidden;
}
#send-btn::after {
  content:''; position:absolute; inset:0;
  background:rgba(255,255,255,0); transition:background .15s;
}
#send-btn:active::after { background:rgba(255,255,255,0.1); }
#send-btn:active { transform:scale(0.98); }
#send-btn:disabled { opacity:0.5; transform:none; cursor:not-allowed; }
#send-btn.loading { pointer-events:none; }

/* ═══ 成功动画弹层 ════════════════════════════════════════════ */
#success-overlay {
  position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,0.75); backdrop-filter:blur(10px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; opacity:0; pointer-events:none; transition:opacity .3s;
}
#success-overlay.show { opacity:1; pointer-events:all; }
.success-icon {
  width:72px; height:72px; border-radius:50%;
  background:rgba(255,107,138,0.2); border:2px solid var(--primary);
  display:flex; align-items:center; justify-content:center;
  font-size:32px;
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes popIn {
  from { transform:scale(0); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}
.success-text { font-size:18px; font-weight:600; color:#fff; letter-spacing:2px; }
.success-sub  { font-size:13px; color:var(--text-dim); letter-spacing:1px; }

/* ═══ 弹幕回显列表 ════════════════════════════════════════════ */
#recent-section { }
#recent-list {
  display:flex; flex-direction:column; gap:8px;
  max-height:260px; overflow-y:auto;
}
#recent-list::-webkit-scrollbar { width:3px; }
#recent-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

.msg-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;
  animation:fadeSlide .35s ease both;
}
@keyframes fadeSlide {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-avatar {
  width:30px; height:30px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,rgba(255,107,138,0.35),rgba(180,50,90,0.35));
  border:1px solid rgba(255,107,138,0.25);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:rgba(255,180,180,0.8);
}
.msg-content { flex:1; }
.msg-name { font-size:12px; color:rgba(255,180,180,0.5); margin-bottom:2px; }
.msg-text { font-size:14px; color:rgba(255,255,255,0.8); line-height:1.5; }

/* ═══ 底部版权 ═══════════════════════════════════════════════ */
#footer { text-align:center; padding:16px; font-size:11px; color:rgba(255,255,255,0.12); letter-spacing:2px; }

/* ═══ Toast 提示 ══════════════════════════════════════════════ */
#toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  z-index:99; opacity:0; transition:all .25s;
  background:rgba(30,10,40,0.92); color:#fff;
  padding:10px 22px; border-radius:24px;
  font-size:13px; letter-spacing:1px; white-space:nowrap;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div id="top-bar">
  <div id="live-count"><div id="live-dot"></div><span id="live-num">-</span> 人在场</div>
  <div class="couple">
    <span id="g-groom">新郎</span>
    <span class="heart">♥</span>
    <span id="g-bride">新娘</span>
  </div>
  <div class="subtitle">送上你的祝福</div>
</div>

<div id="main">

  <!-- 你的名字 -->
  <div class="card">
    <div class="card-title">我是</div>
    <div id="name-row">
      <div class="avatar-placeholder">👤</div>
      <input class="field" id="name-field" type="text" maxlength="10"
             placeholder="你的名字（可不填）" autocomplete="off">
    </div>
  </div>

  <!-- 快捷祝福 -->
  <div class="card">
    <div class="card-title">快捷祝福 · 点击选用</div>
    <div id="quick-grid">
      <div class="quick-btn" onclick="pickQuick(this)">🌹 新婚快乐，百年好合</div>
      <div class="quick-btn" onclick="pickQuick(this)">💕 愿你们永远幸福美满</div>
      <div class="quick-btn" onclick="pickQuick(this)">🥂 大家吃好喝好！</div>
      <div class="quick-btn" onclick="pickQuick(this)">✨ 缘定三生，白首偕老</div>
      <div class="quick-btn" onclick="pickQuick(this)">👰 新娘子太美了！</div>
      <div class="quick-btn" onclick="pickQuick(this)">🎊 一定要狠狠幸福！</div>
      <div class="quick-btn" onclick="pickQuick(this)">💍 天造地设，郎才女貌</div>
      <div class="quick-btn" onclick="pickQuick(this)">🌸 早生贵子，阖家幸福</div>
    </div>
  </div>

  <!-- 自由输入 -->
  <div class="card">
    <div class="card-title">写下祝福</div>
    <div id="msg-wrap">
      <textarea class="field" id="msg-field" maxlength="35"
                placeholder="写下你专属的祝福语…"
                oninput="onMsgInput()"></textarea>
      <div id="char-count">0 / 35</div>
    </div>
  </div>

  <!-- 发送 -->
  <button id="send-btn" onclick="sendMsg()">❤ 发送祝福上大屏</button>

  <!-- 最新弹幕 -->
  <div class="card" id="recent-section">
    <div class="card-title">💬 现场祝福</div>
    <div id="recent-list">
      <div style="text-align:center;color:rgba(255,255,255,0.2);font-size:13px;padding:16px 0;">祝福正在实时飞向大屏…</div>
    </div>
  </div>

</div>

<div id="footer">婚礼弹幕互动系统</div>

<!-- 成功弹层 -->
<div id="success-overlay" onclick="this.classList.remove('show')">
  <div class="success-icon">💌</div>
  <div class="success-text">祝福已飞向大屏！</div>
  <div class="success-sub">点击任意处继续</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════════════════════════
let ws;
let msgList = [];

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => { /* connected */ };

  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);

      if (msg.type === 'init') {
        const s = msg.settings || {};
        applySettings(s);
        setOnline(msg.onlineClients || 0);
        // 回显最近消息
        (msg.messages || []).slice(-10).forEach(addMsgItem);
      }
      if (msg.type === 'settings') applySettings(msg.data || {});
      if (msg.type === 'online')   setOnline(msg.count);
      if (msg.type === 'danmu')    addMsgItem(msg.data);
      if (msg.type === 'error')    showToast(msg.msg || '发送失败');
    } catch (_) {}
  };

  ws.onclose = () => setTimeout(connect, 2500);
}

connect();

function applySettings(s) {
  document.getElementById('g-groom').textContent = s.groomName || '新郎';
  document.getElementById('g-bride').textContent = s.brideName || '新娘';
  // 主题色
  const themeColors = {
    rose:'#ff6b8a', gold:'#f5c842', purple:'#a78bfa', blue:'#60a5fa', teal:'#2dd4bf'
  };
  const c = themeColors[s.theme] || '#ff6b8a';
  document.documentElement.style.setProperty('--primary', c);
  document.querySelector('meta[name="theme-color"]').content = '#0d0016';
}

function setOnline(n) {
  document.getElementById('live-num').textContent = n;
}

// ══════════════════════════════════════════════════════════
//  最近消息列表
// ══════════════════════════════════════════════════════════
function addMsgItem(d) {
  if (!d || !d.text) return;
  const list = document.getElementById('recent-list');
  // 清空占位
  const placeholder = list.querySelector('div[style]');
  if (placeholder) placeholder.remove();

  const initial = (d.name || '?')[0].toUpperCase();
  const item = document.createElement('div');
  item.className = 'msg-item';
  item.innerHTML = `
    <div class="msg-avatar">${initial}</div>
    <div class="msg-content">
      <div class="msg-name">${d.name ? escHtml(d.name) : '匿名宾客'}</div>
      <div class="msg-text">${escHtml(d.text)}</div>
    </div>`;
  list.prepend(item);

  // 最多显示 20 条
  while (list.children.length > 20) list.lastChild.remove();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════════
//  输入逻辑
// ══════════════════════════════════════════════════════════
function onMsgInput() {
  const len = document.getElementById('msg-field').value.length;
  const el  = document.getElementById('char-count');
  el.textContent = `${len} / 35`;
  el.classList.toggle('warn', len >= 30);
}

function pickQuick(el) {
  // 去掉 emoji 前缀
  const raw  = el.textContent.trim();
  const text = raw.replace(/^[\p{Emoji}\s]+/u, '').trim();
  document.getElementById('msg-field').value = text;
  onMsgInput();
  // 视觉反馈
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('picked'));
  el.classList.add('picked');
  setTimeout(() => el.classList.remove('picked'), 400);
  // 滚动到输入框
  document.getElementById('msg-field').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function sendMsg() {
  const name = document.getElementById('name-field').value.trim();
  const text = document.getElementById('msg-field').value.trim();
  if (!text) { showToast('请先写下你的祝福～'); return; }

  const btn = document.getElementById('send-btn');
  if (btn.disabled) return;
  btn.disabled = true;

  if (!ws || ws.readyState !== WebSocket.OPEN) {
    showToast('连接中，请稍后重试…');
    btn.disabled = false;
    return;
  }

  ws.send(JSON.stringify({ type:'danmu', name, text }));

  // 成功反馈
  document.getElementById('success-overlay').classList.add('show');
  document.getElementById('msg-field').value = '';
  onMsgInput();
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('picked'));

  setTimeout(() => btn.disabled = false, 1800);
}

// ══════════════════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// 键盘弹起时防止页面被顶上去（iOS 兼容）
const inputs = document.querySelectorAll('input,textarea');
inputs.forEach(el => {
  el.addEventListener('blur', () => {
    setTimeout(() => window.scrollTo(0, 0), 100);
  });
});
</script>
</body>
</html>
