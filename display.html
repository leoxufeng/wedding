<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚礼弹幕墙</title>
<style>
/* ═══ 全局重置 ════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #ff6b8a;
  --primary-dark: #c94070;
  --primary-glow: rgba(255,107,138,0.4);
  --gold: #f5c842;
  --text: #fff;
  --text-dim: rgba(255,255,255,0.5);
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.12);
  --panel-bg: rgba(8,0,18,0.88);
}

html, body { width:100%; height:100%; overflow:hidden; background:#06000e; }

/* ═══ 背景层 ════════════════════════════════════════════════ */
#bg-image {
  position:fixed; inset:0; z-index:0;
  background-size:cover; background-position:center; background-repeat:no-repeat;
  transition: background-image .6s ease, opacity .6s ease,
              top .4s ease, right .4s ease, bottom .4s ease, left .4s ease;
}
#bg-gradient {
  position:fixed; inset:0; z-index:1;
  background:
    radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,40,0.85) 0%, transparent 70%),
    radial-gradient(ellipse 70% 70% at 80% 70%, rgba(20,0,60,0.8) 0%, transparent 70%),
    linear-gradient(160deg, #0e0018 0%, #1a0030 50%, #0a0010 100%);
  transition: opacity .8s ease,
              top .4s ease, right .4s ease, bottom .4s ease, left .4s ease;
}
#bg-overlay {
  position:fixed; inset:0; z-index:2;
  background:rgba(0,0,0,0);
  transition: background .5s,
              top .4s ease, right .4s ease, bottom .4s ease, left .4s ease;
}

/* ═══ 花瓣层 ════════════════════════════════════════════════ */
#petals {
  position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden;
  transition: top .4s ease, right .4s ease, bottom .4s ease, left .4s ease;
}
.petal {
  position:absolute; top:-20px;
  border-radius: 50% 0 50% 0;
  opacity:0; pointer-events:none;
  animation: petalFall linear infinite;
}
@keyframes petalFall {
  0%   { transform:translateY(0) rotate(0deg); opacity:0.9; }
  80%  { opacity:0.6; }
  100% { transform:translateY(110vh) rotate(900deg) translateX(60px); opacity:0; }
}

/* ═══ 顶部标题 ══════════════════════════════════════════════ */
#header {
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; flex-direction:column; align-items:center;
  padding:22px 200px 18px;
  background:linear-gradient(to bottom, rgba(6,0,14,0.92) 60%, transparent);
  transition: top .4s ease, left .4s ease, right .4s ease;
}
#header .names {
  font-size:clamp(28px, 4.5vw, 56px);
  font-weight:700; letter-spacing:6px;
  color:#fff;
  text-shadow: 0 0 40px var(--primary-glow), 0 0 80px rgba(255,100,130,0.2);
  display:flex; align-items:center; gap:16px;
}
#header .names .amp {
  font-size:0.6em; font-weight:300;
  color:rgba(255,255,255,0.3); letter-spacing:0;
}
#header .names .name { color:#fff; }
#header .names .heart { color:var(--primary); font-size:0.7em; animation:heartbeat 1.8s ease-in-out infinite; }
@keyframes heartbeat {
  0%,100% { transform:scale(1); } 14% { transform:scale(1.25); } 28% { transform:scale(1); }
  42% { transform:scale(1.18); } 56% { transform:scale(1); }
}
#header .subtitle {
  margin-top:8px;
  font-size:clamp(16px,2vw,26px);
  letter-spacing:8px; color:rgba(255,200,200,0.6);
}
#header .date-badge {
  margin-top:6px;
  font-size:clamp(14px,1.6vw,22px); letter-spacing:5px; color:rgba(255,180,180,0.5);
  display:none;
}
#header .date-badge.show { display:block; }

/* ═══ 弹幕舞台 ══════════════════════════════════════════════ */
#stage {
  position:fixed; left:0; right:0;
  top:110px; bottom:210px;
  z-index:10; overflow:hidden;
  transition: top .4s ease, bottom .4s ease, left .4s ease, right .4s ease;
}

.track {
  position:absolute; left:0; right:0;
  height:50px; display:flex; align-items:center;
}

.bubble {
  position:absolute; left:100%;
  white-space:nowrap;
  padding:8px 20px;
  border-radius:28px;
  font-size:clamp(14px,1.7vw,20px);
  font-weight:500;
  cursor:default;
  animation:slideLeft linear forwards;
  will-change:transform;
  transition:filter .15s;
  user-select:none;
}
.bubble:hover { filter:brightness(1.3) drop-shadow(0 0 8px currentColor); z-index:99; }

@keyframes slideLeft {
  from { transform:translateX(0); }
  to   { transform:translateX(calc(-100vw - 800px)); }
}

/* 颜色系 */
.c0 { background:rgba(255,100,130,0.18); border:1px solid rgba(255,100,130,0.4); color:#ffb3c6; }
.c1 { background:rgba(245,200,66, 0.16); border:1px solid rgba(245,200,66, 0.38); color:#ffe98a; }
.c2 { background:rgba(110,190,255,0.16); border:1px solid rgba(110,190,255,0.38); color:#bde0ff; }
.c3 { background:rgba(170,120,255,0.18); border:1px solid rgba(170,120,255,0.4); color:#ddc8ff; }
.c4 { background:rgba( 80,210,170,0.16); border:1px solid rgba( 80,210,170,0.38); color:#a8f0d8; }
.c5 { background:rgba(255,155, 80,0.16); border:1px solid rgba(255,155, 80,0.38); color:#ffd4a0; }

/* 宾客实时消息 - 高亮 */
.bubble.live {
  background:rgba(255, 80,110,0.30) !important;
  border:1.5px solid rgba(255,80,110,0.75) !important;
  color:#fff !important;
  box-shadow:0 0 24px rgba(255,80,110,0.35), inset 0 0 12px rgba(255,255,255,0.04);
  font-size:calc(clamp(14px,1.7vw,20px) * 1.08);
  font-weight:600;
}
.bubble.live .bubble-name { color:#ff9ab2; font-size:0.82em; margin-right:5px; }

/* ═══ 底部栏 ═════════════════════════════════════════════════ */
#bottom {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  height:210px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 40px;
  background:linear-gradient(to top, rgba(6,0,14,0.97) 70%, transparent);
  transition: bottom .4s ease, left .4s ease, right .4s ease;
}

/* 统计 */
#stats {
  display:flex; flex-direction:column; gap:6px;
}
#stats .count-row {
  display:flex; align-items:baseline; gap:8px;
}
#stats .count-num {
  font-size:clamp(28px,4vw,52px);
  font-weight:800; color:var(--primary);
  text-shadow:0 0 20px var(--primary-glow);
  line-height:1;
  transition:transform .15s;
}
#stats .count-num.bump { transform:scale(1.25); }
#stats .count-label { font-size:14px; color:rgba(255,180,180,0.5); letter-spacing:2px; }
#stats .online-row { font-size:12px; color:rgba(255,255,255,0.25); letter-spacing:1px; }
#stats .online-dot {
  display:inline-block; width:6px; height:6px;
  border-radius:50%; background:#4ade80;
  margin-right:5px; animation:blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 二维码面板 */
#qr-panel {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  cursor:pointer;
}
#qr-wrap {
  position:relative;
  padding:10px;
  background:rgba(255,255,255,0.95);
  border-radius:16px;
  box-shadow:0 0 0 2px var(--primary), 0 0 30px var(--primary-glow), 0 0 60px rgba(255,100,130,0.15);
  animation:qrPulse 3s ease-in-out infinite;
}
@keyframes qrPulse {
  0%,100% { box-shadow:0 0 0 2px var(--primary),0 0 20px var(--primary-glow); }
  50%      { box-shadow:0 0 0 4px var(--primary),0 0 40px rgba(255,100,130,0.5); }
}
#qr-img { width:170px; height:170px; display:block; border-radius:10px; }
#qr-loading { width:170px; height:170px; display:flex; align-items:center; justify-content:center;
  color:rgba(255,100,130,0.6); font-size:32px; }
#qr-label { font-size:14px; letter-spacing:3px; color:rgba(255,200,200,0.6); text-align:center; font-weight:500; }
#qr-url   { font-size:11px; color:rgba(255,255,255,0.25); max-width:200px; text-align:center;
  word-break:break-all; }

/* 二维码大图蒙层 */
#qr-modal {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; opacity:0; pointer-events:none; transition:opacity .3s;
}
#qr-modal.show { opacity:1; pointer-events:all; }
#qr-modal img { width:min(320px,60vw); height:min(320px,60vw); border-radius:20px;
  background:#fff; padding:16px; }
#qr-modal .modal-tip { color:rgba(255,200,200,0.6); font-size:16px; letter-spacing:3px; }
#qr-modal .modal-url { color:rgba(255,255,255,0.35); font-size:13px; }

/* ═══ 设置面板 ═══════════════════════════════════════════════ */

#settings-panel {
  position:fixed; top:0; right:-420px; bottom:0; z-index:40;
  width:380px; background:var(--panel-bg);
  border-left:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  transition:right .35s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
  overflow:hidden;
}
#settings-panel.open { right:0; }

.sp-header {
  padding:20px 24px 16px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; justify-content:space-between;
}
.sp-header h3 { color:#fff; font-size:16px; letter-spacing:2px; }
#sp-close {
  background:none; border:none; color:rgba(255,255,255,0.4);
  font-size:20px; cursor:pointer; line-height:1;
  transition:color .2s;
}
#sp-close:hover { color:#fff; }

.sp-body { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:20px; }
.sp-body::-webkit-scrollbar { width:4px; }
.sp-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

.sp-section h4 {
  font-size:11px; letter-spacing:3px; color:rgba(255,180,180,0.45);
  margin-bottom:12px; text-transform:uppercase;
}
.sp-row { margin-bottom:12px; }
.sp-row label { display:block; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:5px; letter-spacing:1px; }
.sp-input {
  width:100%; padding:9px 13px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; color:#fff; font-size:14px; outline:none;
  transition:border-color .2s;
}
.sp-input:focus { border-color:var(--primary); }
.sp-input::placeholder { color:rgba(255,255,255,0.2); }

.sp-range {
  width:100%; accent-color:var(--primary);
  -webkit-appearance:none; height:4px; border-radius:2px;
  background:rgba(255,255,255,0.12); outline:none; cursor:pointer;
}
.sp-range::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--primary); cursor:pointer;
  box-shadow:0 0 8px var(--primary-glow);
}

.sp-themes { display:flex; gap:10px; flex-wrap:wrap; }
.theme-swatch {
  width:36px; height:36px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all .2s;
  position:relative;
}
.theme-swatch.active::after {
  content:'✓'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:14px; font-weight:700;
}
.theme-swatch:hover { transform:scale(1.1); }

.sp-toggle { display:flex; align-items:center; gap:10px; }
.toggle-track {
  width:42px; height:24px; border-radius:12px;
  background:rgba(255,255,255,0.12); position:relative;
  cursor:pointer; transition:background .2s;
}
.toggle-track.on { background:var(--primary); }
.toggle-knob {
  position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%; background:#fff;
  transition:transform .2s; box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.toggle-track.on .toggle-knob { transform:translateX(18px); }
.toggle-label { font-size:13px; color:rgba(255,255,255,0.6); }

/* 上传按钮 */
.upload-row { display:flex; gap:8px; align-items:center; }
.upload-btn {
  padding:8px 14px; border-radius:10px;
  background:rgba(255,100,130,0.15); border:1px solid rgba(255,100,130,0.35);
  color:rgba(255,200,200,0.8); font-size:12px; cursor:pointer;
  white-space:nowrap; transition:all .2s;
}
.upload-btn:hover { background:rgba(255,100,130,0.3); color:#fff; }

/* 保存按钮 */
.sp-save {
  margin:4px 24px 24px;
  padding:12px; border-radius:12px;
  background:linear-gradient(135deg, var(--primary), var(--primary-dark));
  border:none; color:#fff; font-size:15px; font-weight:600;
  cursor:pointer; letter-spacing:2px;
  box-shadow:0 4px 20px rgba(255,80,120,0.35);
  transition:all .2s;
}
.sp-save:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(255,80,120,0.5); }
.sp-save:active { transform:translateY(0); }

/* 保存提示 */
#sp-toast {
  position:fixed; top:24px; left:50%; transform:translateX(-50%) translateY(-80px);
  z-index:99; background:rgba(30,200,120,0.9); color:#fff;
  padding:10px 24px; border-radius:24px; font-size:14px; letter-spacing:1px;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(8px);
}
#sp-toast.show { transform:translateX(-50%) translateY(0); }

/* ═══ 烟花 ═══════════════════════════════════════════════════ */
.firework { position:fixed; pointer-events:none; z-index:50; }
.spark {
  position:absolute; width:5px; height:5px; border-radius:50%;
  animation:sparkBurst .7s ease-out forwards;
}
@keyframes sparkBurst {
  0%   { transform:translate(0,0) scale(1); opacity:1; }
  100% { transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}

/* ═══ 比例遮罩（黑色边条，只盖背景层）══════════════════════ */
#ratio-mask { position:fixed; inset:0; z-index:5; pointer-events:none; }
#ratio-mask .bar { position:absolute; background:#000; }

/* ═══ 工具栏按钮（右侧纵向排列）══════════════════════════════ */
#toolbar {
  position:fixed; top:14px; right:20px; z-index:35;
  display:flex; flex-direction:column; gap:8px; align-items:center;
  transition: top .4s ease, right .4s ease;
}
.tool-btn {
  width:38px; height:38px; border-radius:50%;
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14);
  color:rgba(255,255,255,0.45); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s; backdrop-filter:blur(10px);
  flex-shrink:0;
}
.tool-btn:hover  { background:rgba(255,107,138,0.22); color:#fff; border-color:var(--primary); }
.tool-btn.active { background:rgba(255,107,138,0.28); color:var(--primary); border-color:var(--primary); }

/* ═══ 比例选择面板 ═══════════════════════════════════════════ */
#ratio-panel {
  position:fixed; top:14px; right:70px; z-index:36;
  transition: top .4s ease, right .4s ease;
  background:rgba(8,0,18,0.92); border:1px solid rgba(255,255,255,0.1);
  border-radius:18px; padding:14px 12px;
  backdrop-filter:blur(24px);
  display:none; flex-direction:column; gap:5px;
  min-width:220px;
  box-shadow:0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  animation:panelIn .18s ease;
}
@keyframes panelIn {
  from { opacity:0; transform:translateX(10px) scale(0.97); }
  to   { opacity:1; transform:translateX(0)    scale(1); }
}
#ratio-panel.open { display:flex; }
#ratio-panel h5 {
  font-size:10px; letter-spacing:3px; color:rgba(255,180,180,0.4);
  padding:0 8px 6px; border-bottom:1px solid rgba(255,255,255,0.07);
  margin-bottom:3px; text-transform:uppercase;
}

.ratio-item {
  display:flex; align-items:center; gap:12px;
  padding:9px 10px; border-radius:11px; cursor:pointer;
  border:1px solid transparent; transition:all .15s;
}
.ratio-item:hover  { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.09); }
.ratio-item.active { background:rgba(255,107,138,0.14); border-color:rgba(255,107,138,0.45); }

.ratio-icon {
  position:relative; width:38px; height:26px; flex-shrink:0;
  border:1px solid rgba(255,255,255,0.18); border-radius:3px;
  display:flex; align-items:center; justify-content:center;
}
.ratio-icon .ri-inner {
  position:absolute;
  background:rgba(255,107,138,0.22); border:1px solid rgba(255,107,138,0.55);
  border-radius:2px;
}
.ratio-text { flex:1; }
.ratio-name { font-size:13px; color:rgba(255,255,255,0.85); font-weight:500; }
.ratio-desc { font-size:10px; color:rgba(255,255,255,0.32); margin-top:1px; letter-spacing:.5px; }

#ratio-panel .panel-tip {
  font-size:10px; color:rgba(255,255,255,0.18);
  text-align:center; padding-top:6px; border-top:1px solid rgba(255,255,255,0.06);
  margin-top:3px; letter-spacing:1px;
}

/* 当前比例角标 */
#ratio-badge {
  position:fixed; bottom:218px; left:20px; z-index:25;
  font-size:11px; color:rgba(255,255,255,0.18); letter-spacing:1px;
  display:none;
}
#ratio-badge.show { display:block; }

/* ═══ 加载遮罩 ═══════════════════════════════════════════════ */
#loader {
  position:fixed; inset:0; z-index:200;
  background:#06000e;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; transition:opacity .6s;
}
#loader.hide { opacity:0; pointer-events:none; }
.loader-ring {
  width:48px; height:48px; border-radius:50%;
  border:3px solid rgba(255,100,130,0.15);
  border-top-color:var(--primary);
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loader p { color:rgba(255,200,200,0.4); font-size:13px; letter-spacing:3px; }

/* 连接状态指示 */
#conn-status {
  position:fixed; top:18px; left:20px; z-index:30;
  font-size:11px; color:rgba(255,255,255,0.2); letter-spacing:1px;
  transition: top .4s ease, left .4s ease;
  display:flex; align-items:center; gap:6px;
}
#conn-dot {
  width:6px; height:6px; border-radius:50%;
  background:#666; transition:background .3s;
}
#conn-dot.ok { background:#4ade80; }
#conn-dot.err { background:#f87171; }
</style>
</head>
<body>

<!-- 加载遮罩 -->
<div id="loader">
  <div class="loader-ring"></div>
  <p>婚礼弹幕墙 · 加载中</p>
</div>

<!-- 背景层 -->
<div id="bg-image"></div>
<div id="bg-gradient"></div>
<div id="bg-overlay"></div>

<!-- 花瓣 -->
<div id="petals"></div>

<!-- 连接状态 -->
<div id="conn-status"><div id="conn-dot"></div><span id="conn-text">连接中…</span></div>

<!-- 顶部标题 -->
<div id="header">
  <div class="names">
    <span class="name" id="h-groom">新郎</span>
    <span class="heart">♥</span>
    <span class="amp">&</span>
    <span class="heart">♥</span>
    <span class="name" id="h-bride">新娘</span>
  </div>
  <div class="subtitle">新婚快乐 · 百年好合 · 永结同心</div>
  <div class="date-badge" id="h-date"></div>
</div>

<!-- 弹幕舞台 -->
<div id="stage"></div>

<!-- 底部栏 -->
<div id="bottom">
  <div id="stats">
    <div class="count-row">
      <div class="count-num" id="count-num">0</div>
      <div class="count-label">条祝福</div>
    </div>
    <div class="online-row"><span class="online-dot"></span><span id="online-num">0</span> 人在线</div>
  </div>

  <div id="qr-panel" onclick="toggleQrModal()">
    <div id="qr-wrap">
      <div id="qr-loading">⏳</div>
      <img id="qr-img" style="display:none" alt="扫码二维码">
    </div>
    <div id="qr-label">扫码送祝福</div>
    <div id="qr-url"></div>
  </div>
</div>

<!-- 二维码大图蒙层 -->
<div id="qr-modal" onclick="toggleQrModal()">
  <img id="qr-modal-img" src="" alt="">
  <div class="modal-tip">扫描二维码 · 送上祝福</div>
  <div class="modal-url" id="qr-modal-url"></div>
</div>

<!-- 比例遮罩层 -->
<div id="ratio-mask"></div>

<!-- 当前比例角标 -->
<div id="ratio-badge"></div>

               oninput="document.getElementById('speed-val').textContent=parseFloat(this.value).toFixed(1)+'×'">
      </div>

    <div class="sp-section">
      <h4>主题颜色</h4>
      <div class="sp-themes">
        <div class="theme-swatch active" data-theme="rose"   style="background:linear-gradient(135deg,#ff6b8a,#c94070)" title="玫瑰红"></div>
        <div class="theme-swatch"        data-theme="gold"   style="background:linear-gradient(135deg,#f5c842,#d48800)" title="香槟金"></div>
        <div class="theme-swatch"        data-theme="purple" style="background:linear-gradient(135deg,#a78bfa,#7c3aed)" title="浪漫紫"></div>
        <div class="theme-swatch"        data-theme="blue"   style="background:linear-gradient(135deg,#60a5fa,#2563eb)" title="星空蓝"></div>
        <div class="theme-swatch"        data-theme="teal"   style="background:linear-gradient(135deg,#2dd4bf,#0d9488)" title="碧玉绿"></div>
      </div>
    </div>

    <div class="sp-section">
      <h4>视觉效果</h4>
      <div class="sp-toggle">
        <div class="toggle-track on" id="toggle-petals" onclick="togglePetals()">
          <div class="toggle-knob"></div>
        </div>
        <span class="toggle-label">花瓣飘落</span>

  </div>
  <button class="sp-save" onclick="saveSettings()">保存并应用 ✓</button>
</div>

<!-- 保存提示 -->
<div id="sp-toast">✓ 设置已保存</div>

<script>
// ══════════════════════════════════════════════════════════
//  配置 & 状态
// ══════════════════════════════════════════════════════════
const TRACKS       = 9;
const THEMES = {
  rose:   { primary:'#ff6b8a', dark:'#c94070', bg:'radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,0,40,0.85) 0%, transparent 70%), radial-gradient(ellipse 70% 70% at 80% 70%, rgba(20,0,60,0.8) 0%, transparent 70%), linear-gradient(160deg,#0e0018 0%,#1a0030 50%,#0a0010 100%)' },
  gold:   { primary:'#f5c842', dark:'#c98800', bg:'radial-gradient(ellipse 80% 60% at 20% 40%, rgba(80,50,0,0.85) 0%, transparent 70%), radial-gradient(ellipse 70% 70% at 80% 70%, rgba(40,20,0,0.8) 0%, transparent 70%), linear-gradient(160deg,#120a00 0%,#241500 50%,#0e0800 100%)' },
  purple: { primary:'#a78bfa', dark:'#7c3aed', bg:'radial-gradient(ellipse 80% 60% at 20% 40%, rgba(60,0,100,0.85) 0%, transparent 70%), radial-gradient(ellipse 70% 70% at 80% 70%, rgba(20,0,60,0.8) 0%, transparent 70%), linear-gradient(160deg,#08001a 0%,#14002e 50%,#080012 100%)' },
  blue:   { primary:'#60a5fa', dark:'#2563eb', bg:'radial-gradient(ellipse 80% 60% at 20% 40%, rgba(0,30,80,0.85) 0%, transparent 70%), radial-gradient(ellipse 70% 70% at 80% 70%, rgba(0,10,60,0.8) 0%, transparent 70%), linear-gradient(160deg,#000814 0%,#001428 50%,#00060e 100%)' },
  teal:   { primary:'#2dd4bf', dark:'#0d9488', bg:'radial-gradient(ellipse 80% 60% at 20% 40%, rgba(0,60,60,0.85) 0%, transparent 70%), radial-gradient(ellipse 70% 70% at 80% 70%, rgba(0,30,40,0.8) 0%, transparent 70%), linear-gradient(160deg,#00100e 0%,#002020 50%,#000e0c 100%)' },
};

let tracks   = [];
let settings = {};
let qrDataUrl = '';
let guestUrl  = '';
let showPetals = true;
let petalTimer = null;

// ══════════════════════════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════════════════════════
let ws, wsRetryTimer;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    setConn('ok', '已连接');
  };

  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      switch (msg.type) {

        case 'init':
          settings = msg.settings || {};
          applySettings(settings);
          updateCount(msg.totalCount || 0);
          setOnline(msg.onlineClients || 1);
          guestUrl = msg.guestUrl || '';
          loadQRCode();
          // 回放历史消息（静默，不触发烟花）
          (msg.messages || []).forEach(d => {
            shootBubble(d.name ? `[${d.name}] ${d.text}` : d.text, false);
          });
          // 隐藏加载遮罩
          document.getElementById('loader').classList.add('hide');
          break;

        case 'danmu':
          const d = msg.data;
          const label = d.name ? `[${d.name}] ${d.text}` : d.text;
          shootBubble(label, true);
          updateCount(msg.totalCount);
          firework();
          break;

        case 'settings':
          settings = msg.data;
          applySettings(settings);
          break;

        case 'online':
          setOnline(msg.count);
          break;
      }
    } catch (_) {}
  };

  ws.onerror = () => setConn('err', '连接异常');
  ws.onclose = () => {
    setConn('err', '已断开');
    wsRetryTimer = setTimeout(connectWS, 3000);
  };
}

connectWS();

// 心跳
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'ping' }));
}, 25000);

function setConn(state, text) {
  document.getElementById('conn-dot').className = state === 'ok' ? 'ok' : 'err';
  document.getElementById('conn-text').textContent = text;
}

// ══════════════════════════════════════════════════════════
//  设置应用
// ══════════════════════════════════════════════════════════
function applySettings(s) {
  // 名字
  document.getElementById('h-groom').textContent = s.groomName || '新郎';
  document.getElementById('h-bride').textContent = s.brideName || '新娘';
  // 日期
  const dateEl = document.getElementById('h-date');
  if (s.weddingDate) { dateEl.textContent = s.weddingDate; dateEl.classList.add('show'); }
  else dateEl.classList.remove('show');

  // 背景
  const bgEl       = document.getElementById('bg-image');
  const gradientEl = document.getElementById('bg-gradient');
  if (s.bgImageUrl) {
    bgEl.style.backgroundImage = `url("${s.bgImageUrl}")`;
    bgEl.style.opacity = '1';
    // 有背景图时隐藏渐变层，让图片完整显示
    gradientEl.style.opacity = '0';
  } else {
    bgEl.style.backgroundImage = '';
    bgEl.style.opacity = '0';
    // 无背景图时恢复渐变层
    gradientEl.style.opacity = '1';
  }
  document.getElementById('bg-overlay').style.background = `rgba(0,0,0,${s.bgOpacity ?? 0.45})`;

  // 主题
  applyTheme(s.theme || 'rose');

  // 花瓣
  showPetals = s.showPetals !== false;
  document.getElementById('toggle-petals').classList.toggle('on', showPetals);
  if (showPetals) startPetals(); else stopPetals();

  // 同步面板值
  document.getElementById('sp-groom').value = s.groomName || '';
  document.getElementById('sp-bride').value = s.brideName || '';
  document.getElementById('sp-date').value  = s.weddingDate || '';
  document.getElementById('sp-bg-url').value = s.bgImageUrl || '';
  const op = Math.round((s.bgOpacity ?? 0.45) * 100);
  document.getElementById('sp-opacity').value = op;
  document.getElementById('opacity-val').textContent = op + '%';
  const sp = s.danmuSpeed ?? 1.0;
  document.getElementById('sp-speed').value = sp;
  document.getElementById('speed-val').textContent = sp.toFixed(1) + '×';

  // 主题色标记
  document.querySelectorAll('.theme-swatch').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === (s.theme || 'rose'));
  });
}

function applyTheme(name) {
  const t = THEMES[name] || THEMES.rose;
  document.documentElement.style.setProperty('--primary', t.primary);
  document.documentElement.style.setProperty('--primary-dark', t.dark);
  document.documentElement.style.setProperty('--primary-glow', t.primary + '66');
  document.getElementById('bg-gradient').style.background = t.bg;
}

// 主题切换
document.querySelectorAll('.theme-swatch').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.theme-swatch').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    applyTheme(el.dataset.theme);
  });
});

// ══════════════════════════════════════════════════════════
//  弹幕引擎
// ══════════════════════════════════════════════════════════
function buildTracks() {
  const stage  = document.getElementById('stage');
  stage.innerHTML = '';
  tracks = [];
  const h = stage.offsetHeight;
  const th = Math.floor(h / TRACKS);
  for (let i = 0; i < TRACKS; i++) {
    const el = document.createElement('div');
    el.className = 'track';
    el.style.top = (i * th + (th - 50) / 2) + 'px';
    stage.appendChild(el);
    tracks.push({ el, endTime: 0 });
  }
}
buildTracks();
window.addEventListener('resize', buildTracks);

const COLORS = 6;
function shootBubble(text, isLive = false) {
  // 找最空闲的轨道
  const now = performance.now();
  let best = 0, bestScore = Infinity;
  tracks.forEach((t, i) => {
    const score = t.endTime - now;
    if (score < bestScore) { bestScore = score; best = i; }
  });
  const track = tracks[best];
  const ci = Math.floor(Math.random() * COLORS);

  const b = document.createElement('div');
  b.className = `bubble c${ci}${isLive ? ' live' : ''}`;

  // 宾客消息加名字标签
  if (isLive && text.startsWith('[')) {
    const m = text.match(/^\[([^\]]*)\] (.*)$/);
    if (m) {
      const nameSpan = document.createElement('span');
      nameSpan.className = 'bubble-name';
      nameSpan.textContent = m[1] + ' ';
      b.appendChild(nameSpan);
      b.appendChild(document.createTextNode(m[2]));
    } else {
      b.textContent = text;
    }
  } else {
    b.textContent = text;
  }

  track.el.appendChild(b);

  const speed  = settings.danmuSpeed ?? 0.6;
  const baseMs = (14 + text.length * 0.25 + Math.random() * 4) / speed * 1000;
  b.style.animationDuration = baseMs + 'ms';
  track.endTime = now + baseMs * 0.35; // 消息走完 35% 后该轨道可复用

  b.addEventListener('animationend', () => b.remove());
}

// 自动演示弹幕
const demo = [
  '祝新郎新娘永结同心 百年好合 🌹','新婚快乐！愿你们幸福美满',
  '缘定三生 白首偕老','一定要狠狠幸福下去哦～ 🌸',
  '圆圆满满 美满一生','相敬如宾 同德同心',
  '新娘子好漂亮啊 👰','大家吃好喝好 🥂',
  '愿你们爱情长跑终成正果 🏆','男帅女美 天造地设',
  '幸福就是和你在一起 💕','今日良缘 天作之合 宾主尽欢',
  '祝贺！你们是最棒的一对！','愿爱情之火越烧越旺 🔥',
  '祝两位早生贵子 👶','一生有你 幸福无边',
  '两情相悦 共此佳期','感谢邀请！见证这美好时刻',
  '越来越好 越来越甜 🍬','恭喜恭喜！百年好合！',
];
let demoIdx = 0;
function autoDemo() {
  shootBubble(demo[demoIdx % demo.length], false);
  demoIdx++;
}
// 延迟启动（等 WebSocket 初始化后），每 3 秒发一条
setTimeout(() => {
  for (let i = 0; i < 4; i++) setTimeout(autoDemo, i * 600);
  setInterval(autoDemo, 3200);
}, 1000);

// ══════════════════════════════════════════════════════════
//  计数 & 在线人数
// ══════════════════════════════════════════════════════════
function updateCount(n) {
  const el = document.getElementById('count-num');
  el.textContent = n;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}
function setOnline(n) {
  document.getElementById('online-num').textContent = n;
}

// ══════════════════════════════════════════════════════════
//  二维码
// ══════════════════════════════════════════════════════════
async function loadQRCode() {
  try {
    const r = await fetch('/api/qrcode');
    const j = await r.json();
    qrDataUrl = j.qr;
    guestUrl  = j.url;
    document.getElementById('qr-loading').style.display = 'none';
    const img = document.getElementById('qr-img');
    img.src = j.qr;
    img.style.display = 'block';
    document.getElementById('qr-url').textContent = j.url;
    document.getElementById('qr-modal-img').src = j.qr;
    document.getElementById('qr-modal-url').textContent = j.url;
  } catch (e) {
    document.getElementById('qr-loading').textContent = '❌';
  }
}

function toggleQrModal() {
  document.getElementById('qr-modal').classList.toggle('show');
}

// ══════════════════════════════════════════════════════════
//  花瓣
// ══════════════════════════════════════════════════════════
const PETAL_COLORS = ['#ff9ab2','#ffb3c6','#ffd6e0','#ff85a1','#ffc8d5','#ffacc5'];

function createPetal() {
  if (!showPetals) return;
  const p  = document.createElement('div');
  p.className = 'petal';
  const size = 6 + Math.random() * 10;
  p.style.cssText = `
    left:${Math.random()*105}vw;
    width:${size}px; height:${size * 0.7}px;
    background:${PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)]};
    animation-duration:${5+Math.random()*7}s;
    animation-delay:${Math.random()*2}s;
    opacity:0.9;
  `;
  document.getElementById('petals').appendChild(p);
  setTimeout(() => p.remove(), 14000);
}

function startPetals() {
  stopPetals();
  for (let i = 0; i < 6; i++) setTimeout(createPetal, i * 300);
  petalTimer = setInterval(createPetal, 700);
}
function stopPetals() {
  clearInterval(petalTimer);
  document.getElementById('petals').innerHTML = '';
}
function togglePetals() {
  showPetals = !showPetals;
  document.getElementById('toggle-petals').classList.toggle('on', showPetals);
  if (showPetals) startPetals(); else stopPetals();
}

startPetals();

// ══════════════════════════════════════════════════════════
//  烟花
// ══════════════════════════════════════════════════════════
const SPARK_COLORS = ['#ff6b8a','#ffcc44','#a78bfa','#34d399','#60a5fa','#ff9ab2','#f5c842'];
function firework() {
  const fw = document.createElement('div');
  fw.className = 'firework';
  const x = 80 + Math.random() * (window.innerWidth - 160);
  const y = 60 + Math.random() * (window.innerHeight * 0.5);
  fw.style.cssText = `left:${x}px;top:${y}px`;
  document.body.appendChild(fw);
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.background = SPARK_COLORS[i % SPARK_COLORS.length];
    const angle = (i / 20) * 360;
    const dist  = 45 + Math.random() * 55;
    s.style.cssText += `--dx:${Math.cos(angle*Math.PI/180)*dist}px;--dy:${Math.sin(angle*Math.PI/180)*dist}px`;
    fw.appendChild(s);
  }
  setTimeout(() => fw.remove(), 800);
}

// ══════════════════════════════════════════════════════════
//  设置面板
// ══════════════════════════════════════════════════════════
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

async function saveSettings() {
  const newSettings = {
    groomName:   document.getElementById('sp-groom').value.trim() || '新郎',
    brideName:   document.getElementById('sp-bride').value.trim() || '新娘',
    weddingDate: document.getElementById('sp-date').value.trim(),
    bgImageUrl:  document.getElementById('sp-bg-url').value.trim(),
    bgOpacity:   parseInt(document.getElementById('sp-opacity').value) / 100,
    danmuSpeed:  parseFloat(document.getElementById('sp-speed').value),
    showPetals,
    theme: document.querySelector('.theme-swatch.active')?.dataset.theme || 'rose',
  };
  try {
    await fetch('/api/settings', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(newSettings)
    });
    applySettings(newSettings);
    showToast('✓ 设置已保存');
  } catch(e) {
    showToast('⚠ 保存失败，请重试');
  }
}

function showToast(msg) {
  const t = document.getElementById('sp-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function uploadBg(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('image', file);
  try {
    const r = await fetch('/api/upload-bg', { method:'POST', body:fd });
    const j = await r.json();
    if (j.url) {
      document.getElementById('sp-bg-url').value = j.url;
      showToast('✓ 图片上传成功');
    }
  } catch(e) {
    showToast('⚠ 上传失败');
  }
  input.value = '';
}

function clearBg() {
  document.getElementById('sp-bg-url').value = '';
  document.getElementById('bg-image').style.backgroundImage = '';
  document.getElementById('bg-image').style.opacity = '0';
}

// ══════════════════════════════════════════════════════════
//  屏幕比例控制
// ══════════════════════════════════════════════════════════
const RATIOS = {
  'auto':  { w:0,  h:0,   label:'' },
  '16:9':  { w:16, h:9,   label:'16:9'  },
  '4:3':   { w:4,  h:3,   label:'4:3'   },
  '16:10': { w:16, h:10,  label:'16:10' },
  '21:9':  { w:21, h:9,   label:'21:9'  },
  '32:9':  { w:32, h:9,   label:'32:9'  },
  '1:1':   { w:1,  h:1,   label:'1:1'   },
};
let currentRatio = 'auto';

// 计算当前视口对应比例所需的边距 { top, right, bottom, left }（px）
function calcBars(id) {
  const r = RATIOS[id];
  if (!r || !r.w) return { top:0, right:0, bottom:0, left:0 };
  const vw = window.innerWidth, vh = window.innerHeight;
  const target = r.w / r.h, screen = vw / vh;
  if (Math.abs(screen - target) <= 0.01) return { top:0, right:0, bottom:0, left:0 };
  if (screen > target) {
    const bw = Math.round((vw - vh * target) / 2);
    return { top:0, right:bw, bottom:0, left:bw };
  } else {
    const bh = Math.round((vh - vw / target) / 2);
    return { top:bh, right:0, bottom:bh, left:0 };
  }
}

// 将边距应用到背景层（背景图、渐变、遮罩、花瓣）
function applyBarsToLayers(bars) {
  const { top, right, bottom, left } = bars;
  const inset = `${top}px ${right}px ${bottom}px ${left}px`;
  ['bg-image','bg-gradient','bg-overlay','petals'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.inset = inset;
  });
}

// 将边距应用到所有内容 UI 元素（始终保持在可视区域内）
function applyBarsToContent(bars) {
  const { top, right, bottom, left } = bars;

  // 顶部标题
  const hdr = document.getElementById('header');
  hdr.style.top   = top  + 'px';
  hdr.style.left  = left + 'px';
  hdr.style.right = right + 'px';

  // 弹幕舞台
  const stg = document.getElementById('stage');
  stg.style.top    = (top  + 110) + 'px';
  stg.style.bottom = (bottom + 210) + 'px';
  stg.style.left   = left  + 'px';
  stg.style.right  = right + 'px';

  // 底部栏（含二维码）
  const bot = document.getElementById('bottom');
  bot.style.bottom = bottom + 'px';
  bot.style.left   = left   + 'px';
  bot.style.right  = right  + 'px';

  // 工具栏
  const tbr = document.getElementById('toolbar');
  tbr.style.top   = (top   + 14) + 'px';
  tbr.style.right = (right + 20) + 'px';

  // 比例选择面板
  const rp = document.getElementById('ratio-panel');
  rp.style.top   = (top   + 14) + 'px';
  rp.style.right = (right + 70) + 'px';

  // 连接状态
  const cs = document.getElementById('conn-status');
  cs.style.top  = (top  + 18) + 'px';
  cs.style.left = (left + 20) + 'px';

  // 比例角标
  const rb = document.getElementById('ratio-badge');
  rb.style.left   = (left   + 20)  + 'px';
  rb.style.bottom = (bottom + 218) + 'px';

  // 弹幕轨道需要重建（尺寸变了）
  setTimeout(buildTracks, 420);
}

function setRatio(id) {
  currentRatio = id;
  const mask  = document.getElementById('ratio-mask');
  const badge = document.getElementById('ratio-badge');
  mask.innerHTML = '';

  // 更新选中状态
  document.querySelectorAll('.ratio-item').forEach(el =>
    el.classList.toggle('active', el.dataset.ratio === id));
  document.getElementById('ratio-btn').classList.toggle('active', id !== 'auto');

  const r = RATIOS[id];

  // 无比例限制（自适应）
  if (!r || !r.w) {
    const zero = { top:0, right:0, bottom:0, left:0 };
    applyBarsToLayers(zero);
    applyBarsToContent(zero);
    badge.classList.remove('show');
    document.getElementById('ratio-panel').classList.remove('open');
    return;
  }

  // 计算黑边尺寸
  const bars = calcBars(id);

  // ① 黑色遮罩条
  if (bars.left) {
    mask.innerHTML =
      `<div class="bar" style="top:0;left:0;width:${bars.left}px;height:100%"></div>` +
      `<div class="bar" style="top:0;right:0;width:${bars.right}px;height:100%"></div>`;
  } else if (bars.top) {
    mask.innerHTML =
      `<div class="bar" style="top:0;left:0;right:0;height:${bars.top}px"></div>` +
      `<div class="bar" style="bottom:0;left:0;right:0;height:${bars.bottom}px"></div>`;
  }

  // ② 背景层跟随收缩（平滑过渡）
  applyBarsToLayers(bars);

  // ③ 内容元素同步移入可视区域
  applyBarsToContent(bars);

  badge.textContent = '比例锁定 ' + r.label;
  badge.classList.add('show');
  document.getElementById('ratio-panel').classList.remove('open');
}

function toggleRatioPanel() {
  document.getElementById('ratio-panel').classList.toggle('open');
  // 关闭其他面板
  document.getElementById('settings-panel').classList.remove('open');
}

// 窗口缩放时重新计算黑边 & 背景层
window.addEventListener('resize', () => {
  if (currentRatio !== 'auto') setRatio(currentRatio);
});

// ══════════════════════════════════════════════════════════
//  全屏控制
// ══════════════════════════════════════════════════════════
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {
      showToast('⚠ 浏览器不支持全屏，请按 F11');
    });
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fullscreen-btn');
  if (document.fullscreenElement) {
    btn.textContent = '✕'; btn.title = '退出全屏 (F)';
    btn.classList.add('active');
  } else {
    btn.textContent = '⛶'; btn.title = '全屏 (F)';
    btn.classList.remove('active');
  }
});

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 's' || e.key === 'S') { toggleSettings(); document.getElementById('ratio-panel').classList.remove('open'); }
  if (e.key === 'q' || e.key === 'Q') toggleQrModal();
  if (e.key === 'r' || e.key === 'R') toggleRatioPanel();
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'Escape') {
    document.getElementById('settings-panel').classList.remove('open');
    document.getElementById('ratio-panel').classList.remove('open');
    document.getElementById('qr-modal').classList.remove('show');
  }
});
</script>
